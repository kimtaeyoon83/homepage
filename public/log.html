<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log · Freddie's space</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#070a12;--starlight:#f3efe3;--brass:#c7a24a;--haze:#9aabc8;
    --line:rgba(199,162,74,.16);--inset:34px}
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{min-height:100%;background:var(--ink);color:var(--starlight);
    font-family:'IBM Plex Mono',ui-monospace,monospace;-webkit-font-smoothing:antialiased}

  .base{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(900px 620px at 78% 12%, rgba(40,58,120,.22), transparent 64%),
      radial-gradient(820px 560px at 12% 88%, rgba(96,58,130,.16), transparent 66%),
      radial-gradient(circle at 50% 30%, #0b1020 0%, #070a12 72%, #03040a 100%);}
  .base::after{content:"";position:absolute;inset:0;opacity:.4;
    background-image:
      radial-gradient(1.2px 1.2px at 40px 60px,#fff,transparent),
      radial-gradient(1px 1px at 220px 120px,#cfe0ff,transparent),
      radial-gradient(1.3px 1.3px at 380px 220px,#fff,transparent),
      radial-gradient(1px 1px at 540px 80px,#a9c2ff,transparent);
    background-repeat:repeat;background-size:600px 320px}
  .plate{position:fixed;inset:var(--inset);z-index:1;pointer-events:none;border:1px solid var(--line)}
  .tick{position:absolute;width:13px;height:13px}
  .tick::before,.tick::after{content:"";position:absolute;background:var(--brass);opacity:.8}
  .tick::before{left:0;top:6px;width:13px;height:1px}.tick::after{left:6px;top:0;width:1px;height:13px}
  .tl{left:-7px;top:-7px}.tr{right:-7px;top:-7px}.bl{left:-7px;bottom:-7px}.br{right:-7px;bottom:-7px}

  .wrap{position:relative;z-index:2;max-width:720px;margin:0 auto;
    padding:clamp(60px,11vh,120px) clamp(28px,6vw,40px) 120px}

  .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:clamp(40px,8vh,84px)}
  .back{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--brass);
    text-decoration:none;border-bottom:1px solid transparent;padding-bottom:2px;transition:.3s}
  .back:hover{color:var(--starlight);border-color:var(--brass)}
  .back:focus-visible{outline:1px solid var(--brass);outline-offset:4px}
  .top .here{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--haze)}

  /* ---------- list ---------- */
  .lead{margin-bottom:clamp(34px,6vh,60px)}
  .lead .eyebrow{font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:var(--brass);margin-bottom:16px}
  .lead h1{font-family:'Cormorant',serif;font-weight:500;font-size:clamp(46px,9vw,88px);line-height:.96;letter-spacing:.01em}
  .lead p{font-family:'Newsreader',serif;color:var(--haze);font-size:clamp(15px,2vw,18px);margin-top:14px;line-height:1.6}

  .catalog{border-top:1px solid var(--line)}
  .entry{display:grid;grid-template-columns:88px 1fr;gap:6px 22px;align-items:baseline;
    padding:22px 6px;border-bottom:1px solid var(--line);text-decoration:none;color:inherit;
    transition:background .3s ease,padding-left .3s ease}
  .entry:hover{background:rgba(199,162,74,.05);padding-left:14px}
  .entry:focus-visible{outline:1px solid var(--brass);outline-offset:-1px}
  .entry .meta{font-size:10.5px;letter-spacing:.14em;color:var(--haze);line-height:1.7}
  .entry .meta .n{color:var(--brass)}
  .entry .ttl{font-family:'Cormorant',serif;font-weight:500;font-size:clamp(24px,3.6vw,33px);
    line-height:1.08;color:var(--starlight)}
  .entry .sum{grid-column:2;font-family:'Newsreader',serif;color:var(--haze);
    font-size:14.5px;line-height:1.55;margin-top:7px}
  .empty{font-family:'Newsreader',serif;color:var(--haze);font-style:italic;
    font-size:18px;padding:40px 0;line-height:1.6}

  /* ---------- post ---------- */
  .post-head{margin-bottom:clamp(30px,5vh,52px)}
  .post-head .eyebrow{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--brass);margin-bottom:18px}
  .post-head h1{font-family:'Cormorant',serif;font-weight:500;font-size:clamp(38px,7vw,72px);
    line-height:1.0;letter-spacing:.01em}
  article{font-family:'Newsreader',serif;font-size:clamp(17px,2.2vw,19.5px);line-height:1.78;color:#e7e3d6}
  article p{margin:0 0 1.25em}
  article h2{font-family:'Cormorant',serif;font-weight:600;font-size:1.7em;line-height:1.15;
    margin:1.8em 0 .6em;color:var(--starlight)}
  article h3{font-family:'Cormorant',serif;font-weight:600;font-size:1.35em;margin:1.5em 0 .5em;color:var(--starlight)}
  article a{color:var(--brass);text-underline-offset:3px;text-decoration-thickness:1px}
  article a:hover{color:var(--starlight)}
  article blockquote{margin:1.6em 0;padding:.2em 0 .2em 1.2em;border-left:2px solid var(--brass);
    font-style:italic;color:var(--haze)}
  article code{font-family:'IBM Plex Mono',monospace;font-size:.82em;background:rgba(199,162,74,.1);
    padding:.12em .4em;border-radius:3px}
  article pre{background:rgba(10,16,30,.6);border:1px solid var(--line);border-radius:6px;
    padding:16px 18px;overflow:auto;margin:1.4em 0}
  article pre code{background:none;padding:0;font-size:.8em;color:#dfe6f2;line-height:1.6}
  article img{max-width:100%;height:auto;border-radius:6px;margin:1.4em 0;display:block}
  article hr{border:0;border-top:1px solid var(--line);margin:2.4em 0}
  article ul,article ol{margin:0 0 1.25em 1.3em}article li{margin:.35em 0}
  .foot{margin-top:clamp(50px,9vh,90px);padding-top:24px;border-top:1px solid var(--line);
    display:flex;justify-content:space-between;font-size:11px;letter-spacing:.2em;color:var(--haze)}
  .foot a{color:var(--brass);text-decoration:none}.foot a:hover{color:var(--starlight)}

  .hidden{display:none}
  @media (max-width:560px){
    :root{--inset:16px}
    .entry{grid-template-columns:1fr;gap:4px}
    .entry .sum{grid-column:1}
  }
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{transition:none!important}}
</style>
</head>
<body>
  <div class="base"></div>
  <div class="plate"><i class="tick tl"></i><i class="tick tr"></i><i class="tick bl"></i><i class="tick br"></i></div>

  <div class="wrap">
    <div class="top">
      <a class="back" href="/">← Freddie&rsquo;s space</a>
      <span class="here" id="here">Field Log</span>
    </div>

    <!-- LIST VIEW -->
    <section id="list" class="hidden">
      <div class="lead">
        <div class="eyebrow">Field Log · 관측 기록</div>
        <h1>기록</h1>
        <p>떠오르는 생각을 하나씩, 궤도에 남긴다.</p>
      </div>
      <div class="catalog" id="catalog"></div>
    </section>

    <!-- POST VIEW -->
    <article-shell id="post" class="hidden">
      <div class="post-head">
        <div class="eyebrow" id="post-eyebrow">—</div>
        <h1 id="post-title">—</h1>
      </div>
      <article id="post-body"></article>
      <div class="foot">
        <a href="/log.html">← 목록으로</a>
        <span id="post-foot"></span>
      </div>
    </article-shell>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script>
    const $=id=>document.getElementById(id);
    const list=$('list'), post=$('post');
    const params=new URLSearchParams(location.search);
    const slug=params.get('p');

    function pad(n){return String(n).padStart(3,'0')}

    async function loadIndex(){
      try{ const r=await fetch('/log/index.json',{cache:'no-cache'});
        if(!r.ok) throw 0; return await r.json(); }
      catch(e){ return []; }
    }

    async function showList(){
      list.classList.remove('hidden'); $('here').textContent='Field Log';
      const posts=await loadIndex();
      const cat=$('catalog');
      if(!posts.length){ cat.innerHTML='<p class="empty">아직 기록이 없습니다. 첫 전송을 기다리는 중.</p>'; return; }
      const total=posts.length;
      cat.innerHTML=posts.map((p,i)=>{
        const num=pad(total-i); // 가장 오래된 글이 001
        return `<a class="entry" href="?p=${encodeURIComponent(p.slug)}">
          <div class="meta"><span class="n">LOG·${num}</span><br>${p.date||''}</div>
          <div><div class="ttl">${esc(p.title)}</div>${p.summary?`<div class="sum">${esc(p.summary)}</div>`:''}</div>
        </a>`;
      }).join('');
    }

    async function showPost(slug){
      post.classList.remove('hidden');
      let posts=await loadIndex();
      const meta=posts.find(p=>p.slug===slug);
      const total=posts.length, idx=posts.findIndex(p=>p.slug===slug);
      try{
        const r=await fetch('/log/'+encodeURIComponent(slug)+'.md',{cache:'no-cache'});
        if(!r.ok) throw 0;
        let md=await r.text();
        // 본문 첫 H1은 제목으로 빼고 본문에서 제거
        const m=md.match(/^\s*#\s+(.+)\s*$/m);
        const title=(meta&&meta.title)|| (m?m[1].trim():slug);
        if(m) md=md.replace(m[0],'');
        $('post-title').textContent=title;
        document.title=title+' · Freddie\'s space';
        $('here').textContent='Entry';
        const num=idx>=0?'LOG·'+pad(total-idx)+'  ·  ':'';
        $('post-eyebrow').textContent=num+((meta&&meta.date)||'');
        $('post-foot').textContent=(meta&&meta.date)||'';
        $('post-body').innerHTML=marked.parse(md);
      }catch(e){
        $('post-title').textContent='기록을 찾을 수 없습니다';
        $('post-body').innerHTML='<p>요청한 전송이 궤도에 없습니다. <a href="/log.html">목록으로 돌아가기</a>.</p>';
      }
    }
    function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}

    if(slug) showPost(slug); else showList();
  </script>
</body>
</html>
