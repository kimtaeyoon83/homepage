<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Field Log · Freddie's space</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
  :root{--ink:#070a12;--star:#f3efe3;--brass:#c7a24a;--haze:#9aabc8;--line:rgba(199,162,74,.16);--inset:34px}
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{min-height:100%;background:var(--ink);color:var(--star);
    font-family:'IBM Plex Mono',ui-monospace,monospace;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

  /* fixed cosmos backdrop */
  .bg1{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(1000px 680px at 80% 8%, rgba(40,58,120,.20), transparent 62%),
      radial-gradient(880px 600px at 8% 92%, rgba(96,58,130,.14), transparent 64%),
      radial-gradient(circle at 50% 26%, #0b1020 0%, #070a12 70%, #03040a 100%)}
  .bg2{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.28;
    background-image:radial-gradient(1.1px 1.1px at 40px 60px,#fff,transparent),
      radial-gradient(1px 1px at 220px 120px,#cfe0ff,transparent),
      radial-gradient(1.2px 1.2px at 380px 220px,#fff,transparent),
      radial-gradient(1px 1px at 540px 80px,#a9c2ff,transparent);
    background-repeat:repeat;background-size:600px 320px}
  .plate{position:fixed;inset:var(--inset);z-index:1;pointer-events:none;border:1px solid rgba(199,162,74,.14)}
  .tick{position:absolute;width:12px;height:12px;opacity:.8;
    background:linear-gradient(var(--brass),var(--brass)) center/12px 1px no-repeat,
               linear-gradient(var(--brass),var(--brass)) center/1px 12px no-repeat}
  .tl{left:-6px;top:-6px}.tr{right:-6px;top:-6px}.bl{left:-6px;bottom:-6px}.br{right:-6px;bottom:-6px}

  #progress{position:fixed;top:0;left:0;height:2px;width:100%;background:var(--brass);
    transform:scaleX(0);transform-origin:left center;z-index:12;transition:transform .12s linear;
    box-shadow:0 0 8px rgba(199,162,74,.55);pointer-events:none}

  .wrap{position:relative;z-index:2;max-width:680px;margin:0 auto;
    padding:clamp(58px,10vh,116px) clamp(26px,6vw,42px) 130px}
  @keyframes fsIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .fsin{animation:fsIn .6s ease both}

  .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:clamp(40px,8vh,82px)}
  .back{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--brass);text-decoration:none;
    border-bottom:1px solid transparent;padding-bottom:2px;transition:color .3s,border-color .3s}
  .back:hover{color:var(--star);border-color:var(--brass)}
  .back:focus-visible{outline:1px solid var(--brass);outline-offset:4px}
  .crumb{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--haze)}

  /* ---- list ---- */
  .lead{margin-bottom:clamp(36px,6vh,62px)}
  .lead .eyebrow{display:flex;align-items:center;gap:14px;font-size:11px;letter-spacing:.34em;
    text-transform:uppercase;color:var(--brass);margin-bottom:18px}
  .lead .eyebrow .rule{flex:1;height:1px;background:rgba(199,162,74,.22)}
  .lead .eyebrow .cnt{color:var(--haze);letter-spacing:.2em}
  .lead h1{font-family:'Cormorant','Noto Serif KR',serif;font-weight:500;font-size:clamp(46px,9vw,86px);
    line-height:.96;letter-spacing:.01em;color:var(--star)}
  .lead p{font-family:'Newsreader','Noto Serif KR',serif;color:var(--haze);font-size:clamp(15px,2vw,18px);
    margin-top:16px;line-height:1.6;max-width:44ch}
  .catalog{border-top:1px solid var(--line)}
  .entry{display:grid;grid-template-columns:96px 1fr;gap:4px 26px;align-items:baseline;
    padding:26px 8px;border-bottom:1px solid rgba(199,162,74,.12);text-decoration:none;color:inherit;
    transition:background .35s ease,padding-left .35s ease}
  .entry:hover{background:rgba(199,162,74,.045);padding-left:16px}
  .entry:focus-visible{outline:1px solid var(--brass);outline-offset:-1px}
  .entry .meta{font-size:10px;letter-spacing:.13em;line-height:1.8;padding-top:7px}
  .entry .meta .n{color:var(--brass)}
  .entry .meta .d{color:var(--haze)}
  .entry .ttl{font-family:'Cormorant','Noto Serif KR',serif;font-weight:500;font-size:clamp(25px,3.6vw,34px);
    line-height:1.1;letter-spacing:.01em;color:var(--star)}
  .entry .sum{font-family:'Newsreader','Noto Serif KR',serif;color:var(--haze);font-size:15px;
    line-height:1.62;margin-top:9px;max-width:54ch}
  .empty{font-family:'Newsreader','Noto Serif KR',serif;color:var(--haze);font-style:italic;font-size:18px;padding:44px 0;line-height:1.6}

  /* ---- post head ---- */
  .phead{margin-bottom:clamp(28px,5vh,48px)}
  .phead .meta{display:flex;flex-wrap:wrap;align-items:center;gap:10px;font-size:11px;
    letter-spacing:.22em;text-transform:uppercase;margin-bottom:20px}
  .phead .meta .n{color:var(--brass)}.phead .meta .sep{color:rgba(199,162,74,.4)}.phead .meta .x{color:var(--haze)}
  .phead h1{font-family:'Cormorant','Noto Serif KR',serif;font-weight:500;font-size:clamp(32px,5.2vw,55px);
    line-height:1.07;letter-spacing:.008em;color:var(--star);text-wrap:balance}
  .standfirst{font-family:'Cormorant','Noto Serif KR',serif;font-style:italic;font-weight:500;
    font-size:clamp(18px,2.3vw,23px);color:#b9a368;margin-top:18px;line-height:1.32;letter-spacing:.01em}

  /* ---- prose (rendered markdown) ---- */
  .fs-prose{font-family:'Newsreader','Noto Serif KR',serif;font-size:17px;line-height:1.78;color:#e4e0d2;font-variant-numeric:oldstyle-nums}
  .fs-prose > p:first-of-type{font-size:1.05em;line-height:1.72;color:#efeadd}
  .fs-prose p{margin:0 0 1.3em}
  .fs-prose h2{font-family:'Cormorant','Noto Serif KR',serif;font-weight:600;font-size:1.68em;line-height:1.14;margin:2.2em 0 .6em;color:#f5f1e6;letter-spacing:.005em}
  .fs-prose h2:first-child{margin-top:0}
  .fs-prose h3{font-family:'Cormorant','Noto Serif KR',serif;font-weight:600;font-size:1.3em;line-height:1.24;margin:1.9em 0 .5em;color:#f1ecdf}
  .fs-prose strong{color:#f5f1e6;font-weight:600}
  .fs-prose em{font-style:italic;color:#e9e4d6}
  .fs-prose a{color:#c7a24a;text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:3px;text-decoration-color:rgba(199,162,74,.42);transition:color .25s,text-decoration-color .25s}
  .fs-prose a:hover{color:#f3efe3;text-decoration-color:#c7a24a}
  .fs-prose ul,.fs-prose ol{margin:0 0 1.3em;padding-left:1.3em}
  .fs-prose li{margin:.4em 0;padding-left:.2em}
  .fs-prose li::marker{color:#c7a24a}
  .fs-prose blockquote{margin:1.9em 0;padding:.5em 0 .5em 1.5em;border-left:2px solid #c7a24a;font-style:italic;color:#cdd4e3}
  .fs-prose blockquote p{margin:.5em 0}
  .fs-prose blockquote strong{color:#e3c373;font-style:normal}
  .fs-prose code{font-family:'IBM Plex Mono',monospace;font-size:.8em;background:rgba(199,162,74,.1);padding:.13em .42em;border-radius:3px;color:#e3c373}
  .fs-prose pre{background:rgba(9,14,26,.7);border:1px solid rgba(199,162,74,.16);border-radius:6px;padding:18px 20px;overflow:auto;margin:1.7em 0}
  .fs-prose pre code{background:none;padding:0;color:#dfe6f2;font-size:.84em;line-height:1.65}
  .fs-prose hr{border:0;height:1px;background:linear-gradient(90deg,transparent,rgba(199,162,74,.5),transparent);margin:2.8em 0}
  .fs-prose table{width:100%;border-collapse:collapse;margin:2em 0;font-family:'IBM Plex Mono',monospace;font-size:13.5px;line-height:1.5}
  .fs-prose thead th{text-align:left;color:#c7a24a;font-weight:500;letter-spacing:.06em;text-transform:uppercase;font-size:11.5px;padding:11px 16px 11px 0;border-bottom:1px solid rgba(199,162,74,.42)}
  .fs-prose tbody td{padding:12px 16px 12px 0;border-bottom:1px solid rgba(199,162,74,.12);color:#d7d2c3;vertical-align:top}
  .fs-prose tbody td:first-child{color:#efeadd}
  .fs-prose tbody tr:hover{background:rgba(199,162,74,.04)}
  .fs-prose figure{margin:2.2em 0}
  .fs-prose figure img{width:100%;height:auto;display:block;border-radius:4px;border:1px solid rgba(199,162,74,.18);background:rgba(10,16,30,.5)}
  .fs-prose figure.fig-diagram img{background:#f4f1e9;padding:20px;box-sizing:border-box}
  .fs-prose figcaption{font-family:'IBM Plex Mono',monospace;font-size:11.5px;line-height:1.65;color:#9aabc8;margin-top:11px;letter-spacing:.015em;padding-left:14px;border-left:1px solid rgba(199,162,74,.32)}
  .fs-prose img{max-width:100%;height:auto}

  /* ---- post footer nav ---- */
  .foot{margin-top:clamp(56px,9vh,92px)}
  .foot .div{display:flex;align-items:center;gap:16px;margin-bottom:30px}
  .foot .div span.l{flex:1;height:1px;background:rgba(199,162,74,.18)}
  .foot .div span.s{color:var(--brass);font-size:13px;letter-spacing:.4em}
  .nav{display:flex;gap:18px;align-items:stretch}
  .nav a{flex:1;text-decoration:none;color:inherit;border:1px solid var(--line);border-radius:4px;
    padding:16px 18px;transition:background .3s,border-color .3s}
  .nav a:hover{background:rgba(199,162,74,.05);border-color:rgba(199,162,74,.4)}
  .nav a.newer{text-align:right}
  .nav .lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--haze)}
  .nav .t{font-family:'Cormorant','Noto Serif KR',serif;font-size:20px;color:var(--star);margin-top:7px;line-height:1.15}
  .tolist{margin-top:30px;text-align:center;font-size:11px;letter-spacing:.18em}
  .tolist a{color:var(--brass);text-decoration:none}.tolist a:hover{color:var(--star)}

  .hide{display:none}
  @media (max-width:560px){
    :root{--inset:16px}
    .entry{grid-template-columns:1fr;gap:6px}
    .nav{flex-direction:column}.nav a.newer{text-align:left}
    .fs-prose{font-size:17.5px}.fs-prose table{font-size:12.5px}
  }
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
  <div class="bg1"></div><div class="bg2"></div>
  <div class="plate"><i class="tick tl"></i><i class="tick tr"></i><i class="tick bl"></i><i class="tick br"></i></div>
  <div id="progress"></div>

  <div class="wrap" id="wrap">
    <div class="top">
      <a class="back" href="/">&larr; Freddie&rsquo;s space</a>
      <span class="crumb" id="crumb">Field Log</span>
    </div>

    <!-- LIST -->
    <section id="list" class="hide">
      <div class="lead">
        <div class="eyebrow"><span>Field Log · 관측 기록</span><span class="rule"></span><span class="cnt" id="count">00 ENTRIES</span></div>
        <h1>기록</h1>
        <p>떠오르는 생각을 하나씩, 궤도에 남긴다.</p>
      </div>
      <div class="catalog" id="catalog"></div>
    </section>

    <!-- POST -->
    <section id="post" class="hide">
      <div class="phead">
        <div class="meta"><span class="n" id="p-num">LOG · 001</span><span class="sep">/</span><span class="x" id="p-date"></span><span class="sep">/</span><span class="x" id="p-read"></span></div>
        <h1 id="p-title">—</h1>
        <p class="standfirst hide" id="p-standfirst"></p>
      </div>
      <article id="p-body" class="fs-prose"></article>
      <div class="foot">
        <div class="div"><span class="l"></span><span class="s">✦</span><span class="l"></span></div>
        <div class="nav" id="p-nav"></div>
        <div class="tolist"><a href="/log.html" id="toList">전체 목록으로</a></div>
      </div>
    </section>
  </div>

<script>
const $=id=>document.getElementById(id);
const enc=encodeURIComponent;
let POSTS=[];
const pad=n=>String(n).padStart(3,'0');
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function loadIndex(){
  if(POSTS.length) return POSTS;
  try{ const r=await fetch('/log/index.json',{cache:'no-cache'}); POSTS=r.ok?await r.json():[]; }
  catch(e){ POSTS=[]; }
  return POSTS;
}

function showList(){
  $('post').classList.add('hide'); const L=$('list'); L.classList.remove('hide');
  L.classList.remove('fsin'); void L.offsetWidth; L.classList.add('fsin');
  $('crumb').textContent='Field Log';
  document.title='Field Log · Freddie’s space';
  const total=POSTS.length;
  $('count').textContent=pad(total).slice(-2)+' ENTRIES';
  const cat=$('catalog');
  if(!total){ cat.innerHTML='<p class="empty">아직 기록이 없습니다. 첫 전송을 기다리는 중.</p>'; setProgress(); return; }
  cat.innerHTML=POSTS.map((p,i)=>`<a class="entry" href="?p=${enc(p.slug)}" data-slug="${esc(p.slug)}">
      <div class="meta"><div class="n">LOG·${pad(total-i)}</div><div class="d">${p.date||''}</div></div>
      <div><div class="ttl">${esc(p.title)}</div>${p.summary?`<div class="sum">${esc(p.summary)}</div>`:''}</div>
    </a>`).join('');
  cat.querySelectorAll('.entry').forEach(a=>a.addEventListener('click',e=>{e.preventDefault();go(a.dataset.slug);}));
  setProgress();
}

// 마크다운 가공: H1 제거 → standfirst 추출 → 본문 렌더 → 이미지 figure/캡션 → 읽기시간
function processMarkdown(md){
  md=(md||'').replace(/^(?:﻿?\s*#\s+.*(?:\r?\n|$))+/,'').replace(/^\s+/,'');
  let standfirst='';
  const m=md.match(/^##\s*[—–-]\s*(.+?)\s*(?:\r?\n|$)/);
  if(m){ standfirst=m[1].trim(); md=md.slice(m[0].length); }
  const tmp=document.createElement('div');
  tmp.innerHTML=window.marked.parse(md);
  const realKids=el=>[...el.childNodes].filter(n=>!(n.nodeType===3&&!n.textContent.trim()));
  [...tmp.querySelectorAll('p')].forEach(p=>{
    const img=p.querySelector(':scope > img');
    if(!img||p.firstElementChild!==img) return;
    const fig=document.createElement('figure');
    const src=(img.getAttribute('src')||'').toLowerCase();
    if(/\.(svg|png|gif|webp)(\?|#|$)/.test(src)) fig.className='fig-diagram';
    fig.appendChild(img.cloneNode(true));
    const em=p.querySelector(':scope > em');
    if(em){ const cap=document.createElement('figcaption'); cap.innerHTML=em.innerHTML; fig.appendChild(cap); }
    else{
      const next=p.nextElementSibling;
      if(next&&next.tagName==='P'){
        const nk=realKids(next);
        if(nk.length===1&&nk[0].nodeName==='EM'){
          const cap=document.createElement('figcaption'); cap.innerHTML=nk[0].innerHTML; fig.appendChild(cap); next.remove();
        }
      }
    }
    p.replaceWith(fig);
  });
  [...tmp.querySelectorAll('img')].forEach(i=>{ i.loading='lazy'; i.referrerPolicy='no-referrer'; });
  const chars=tmp.textContent.replace(/\s+/g,'').length;
  const reading=Math.max(1,Math.round(chars/500));
  return { html:tmp.innerHTML, standfirst, reading };
}

async function openPost(slug,push){
  await loadIndex();
  const meta=POSTS.find(p=>p.slug===slug);
  const ci=POSTS.findIndex(p=>p.slug===slug), total=POSTS.length;
  let md;
  try{ const r=await fetch('/log/'+enc(slug)+'.md',{cache:'no-cache'}); if(!r.ok)throw 0; md=await r.text(); }
  catch(e){
    $('list').classList.add('hide'); const P=$('post'); P.classList.remove('hide');
    $('p-title').textContent='기록을 찾을 수 없습니다';
    $('p-body').innerHTML='<p>요청한 전송이 궤도에 없습니다. <a href="/log.html">목록으로 돌아가기</a>.</p>';
    $('p-standfirst').classList.add('hide'); $('p-nav').innerHTML=''; setProgress(); return;
  }
  const {html,standfirst,reading}=processMarkdown(md);
  const title=(meta&&meta.title)|| (md.match(/^\s*#\s+(.+)/)||[])[1] || slug;
  $('list').classList.add('hide'); const P=$('post'); P.classList.remove('hide');
  P.classList.remove('fsin'); void P.offsetWidth; P.classList.add('fsin');
  $('crumb').textContent='Entry';
  $('p-num').textContent='LOG · '+(ci>=0?pad(total-ci):'—');
  $('p-date').textContent=(meta&&meta.date)||'';
  $('p-read').textContent=reading+'분 읽기';
  $('p-title').textContent=title;
  const sf=$('p-standfirst');
  if(standfirst){ sf.textContent=standfirst; sf.classList.remove('hide'); } else sf.classList.add('hide');
  $('p-body').innerHTML=html;
  // 이전/다음
  const older=POSTS[ci+1], newer=POSTS[ci-1];
  let nav='';
  if(older) nav+=`<a class="older" href="?p=${enc(older.slug)}" data-slug="${esc(older.slug)}"><div class="lbl">&larr; 이전 기록 · ${pad(total-(ci+1))}</div><div class="t">${esc(older.title)}</div></a>`;
  if(newer) nav+=`<a class="newer" href="?p=${enc(newer.slug)}" data-slug="${esc(newer.slug)}"><div class="lbl">다음 기록 · ${pad(total-(ci-1))} &rarr;</div><div class="t">${esc(newer.title)}</div></a>`;
  $('p-nav').innerHTML=nav;
  $('p-nav').querySelectorAll('a').forEach(a=>a.addEventListener('click',e=>{e.preventDefault();go(a.dataset.slug);}));
  document.title=title+' · Freddie’s space';
  if(push!==false){ try{ history.pushState({slug},'', '?p='+enc(slug)); }catch(e){} }
  scrollTo(0,0); requestAnimationFrame(setProgress);
}

function go(slug){ openPost(slug,true); }
$('toList').addEventListener('click',e=>{e.preventDefault(); history.pushState({},'',location.pathname); showList(); scrollTo(0,0);});

function setProgress(){
  const bar=$('progress'); if(!bar) return;
  if($('post').classList.contains('hide')){ bar.style.transform='scaleX(0)'; return; }
  const h=document.documentElement, max=h.scrollHeight-h.clientHeight;
  const pct=max>0?Math.min(1,Math.max(0,(window.scrollY||h.scrollTop)/max)):0;
  bar.style.transform='scaleX('+pct+')';
}
addEventListener('scroll',setProgress,{passive:true});
addEventListener('resize',setProgress);
addEventListener('popstate',()=>{ const p=new URLSearchParams(location.search).get('p'); if(p)openPost(p,false); else showList(); });

(async function init(){
  await loadIndex();
  const p=new URLSearchParams(location.search).get('p');
  if(p) openPost(p,false); else showList();
})();
</script>
</body>
</html>
