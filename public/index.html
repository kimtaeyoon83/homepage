<style>
  html,body{height:100%}
  body{margin:0;overflow:hidden;background:#070a12;color:#f3efe3;
    font-family:'IBM Plex Mono',ui-monospace,monospace;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  @keyframes fsKen{from{transform:scale(1.015)}to{transform:scale(1.075) translate3d(-1.3%,-1%,0)}}
  @keyframes fsBlink{50%{opacity:.2}}
  .navlog{position:fixed;z-index:6;top:54px;left:58px;font-size:11px;letter-spacing:.28em;text-transform:uppercase;
    color:#c7a24a;text-decoration:none;border-bottom:1px solid transparent;padding-bottom:3px;
    transition:color .3s ease,border-color .3s ease}
  .navlog:hover{color:#f3efe3;border-color:#c7a24a}
  .navlog:focus-visible{outline:1px solid #c7a24a;outline-offset:4px}
  .navlog span{color:#9aabc8}
  @media (max-width:600px){
    .frame{inset:18px !important}
    .navlog{top:30px;left:30px;letter-spacing:.2em}
    #fs-credit{top:32px !important;right:28px !important}
    #fs-rbl{left:28px !important;bottom:34px !important}
    #fs-clock{right:28px !important;bottom:34px !important}
    #fs-index{bottom:14px !important}
    main{padding:7vw !important}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
  <div style="position:fixed;inset:0;z-index:0;background:radial-gradient(900px 620px at 72% 22%, rgba(40,58,120,.30), transparent 64%), radial-gradient(820px 560px at 20% 82%, rgba(96,58,130,.20), transparent 66%), radial-gradient(circle at 50% 44%, #0b1020 0%, #070a12 70%, #03040a 100%)"></div>

  <div id="fs-slides" style="position:fixed;inset:0;z-index:1"></div>

  <div style="position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(142% 108% at 50% 38%, transparent 22%, rgba(7,10,18,.50) 70%, rgba(4,6,12,.90) 100%), linear-gradient(180deg, rgba(6,9,16,.66) 0%, transparent 22%, transparent 54%, rgba(6,9,16,.82) 100%)"></div>

  <div class="frame" style="position:fixed;inset:34px;z-index:3;pointer-events:none;border:1px solid rgba(199,162,74,.15)">
    <i style="position:absolute;left:-6px;top:-6px;width:12px;height:12px;opacity:.85;background:linear-gradient(#c7a24a,#c7a24a) center/12px 1px no-repeat, linear-gradient(#c7a24a,#c7a24a) center/1px 12px no-repeat"></i>
    <i style="position:absolute;right:-6px;top:-6px;width:12px;height:12px;opacity:.85;background:linear-gradient(#c7a24a,#c7a24a) center/12px 1px no-repeat, linear-gradient(#c7a24a,#c7a24a) center/1px 12px no-repeat"></i>
    <i style="position:absolute;left:-6px;bottom:-6px;width:12px;height:12px;opacity:.85;background:linear-gradient(#c7a24a,#c7a24a) center/12px 1px no-repeat, linear-gradient(#c7a24a,#c7a24a) center/1px 12px no-repeat"></i>
    <i style="position:absolute;right:-6px;bottom:-6px;width:12px;height:12px;opacity:.85;background:linear-gradient(#c7a24a,#c7a24a) center/12px 1px no-repeat, linear-gradient(#c7a24a,#c7a24a) center/1px 12px no-repeat"></i>
  </div>

  <main style="position:fixed;inset:34px;z-index:4;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:5vw;pointer-events:none">
    <div id="fs-eyebrow" style="font-size:11px;font-weight:500;letter-spacing:.4em;text-transform:uppercase;color:#c7a24a;margin-bottom:28px;opacity:1;transition:opacity .7s ease">Webb Field Report</div>
    <h1 style="font-family:'Cormorant',serif;font-weight:500;color:#f3efe3;font-size:clamp(38px,11vw,162px);line-height:1;letter-spacing:.012em;margin:0;white-space:nowrap;text-shadow:0 0 70px rgba(180,200,255,.20)">Freddie<span style="font-style:italic;font-weight:400;color:#c7a24a">&rsquo;s</span> <span style="font-style:italic;font-weight:400;color:#e8e2d2">space</span></h1>
    <p id="fs-tagline" style="font-family:'Cormorant',serif;font-style:italic;font-weight:400;font-size:clamp(16px,2.4vw,25px);color:#9aabc8;margin:22px 0 0;letter-spacing:.01em;min-height:1.4em;opacity:1;transition:opacity .7s ease">Wandering the deep field, one frame at a time.</p>
  </main>

  <a class="navlog" href="/log.html">기록 <span>&#8599;</span></a>

  <div id="fs-credit" style="position:fixed;z-index:5;top:56px;right:58px;font-size:9.5px;letter-spacing:.2em;color:#9aabc8;text-align:right;opacity:1;transition:opacity .7s ease"><span id="fs-inst" style="color:#c7a24a;opacity:.85">NIRCam</span> &middot; NASA &middot; ESA &middot; CSA</div>

  <div id="fs-rbl" style="position:fixed;z-index:5;left:58px;bottom:56px;font-size:10.5px;letter-spacing:.15em;color:#9aabc8;text-align:left;line-height:1.95;opacity:1;transition:opacity .7s ease">
    <div><span style="color:#c7a24a;opacity:.85">TARGET</span>&nbsp;&nbsp;<span id="fs-name" style="color:#f3efe3">&mdash;</span> <span id="fs-region" style="opacity:.72"></span></div>
    <div><span id="fs-k1" style="color:#c7a24a;opacity:.85">R.A.</span>&nbsp;<span id="fs-v1">&mdash;</span>&nbsp;&nbsp;&nbsp;<span id="fs-k2" style="color:#c7a24a;opacity:.85">DEC</span>&nbsp;<span id="fs-v2">&mdash;</span></div>
  </div>

  <div id="fs-clock" style="position:fixed;z-index:5;right:58px;bottom:56px;font-size:10.5px;letter-spacing:.15em;color:#9aabc8;text-align:right;line-height:1.95">
    <div><span style="color:#c7a24a;opacity:.85">UTC</span>&nbsp;&nbsp;<span id="fs-utc" style="color:#f3efe3">--:--:--</span><span style="animation:fsBlink 1.1s steps(1) infinite">_</span></div>
    <div><span style="color:#c7a24a;opacity:.85">KST</span>&nbsp;&nbsp;<span id="fs-kst">--:--:--</span></div>
  </div>

  <div id="fs-index" style="position:fixed;z-index:5;left:50%;bottom:50px;transform:translateX(-50%);display:flex;gap:9px"></div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  const drift = !reduce;
  const INTERVAL = 32000; // 32초/장

  const PLATES = [
    {img:'jwst-carina.jpg',      cat:'NGC 3324',  region:'Carina Nebula',       eyebrow:'Cosmic Cliffs',
     k1:'R.A.', v1:'10ʰ 36ᵐ 58ˢ', k2:'DEC', v2:'−58° 37′ 55″', inst:'NIRCam',
     tag:'Cosmic cliffs, where new stars are born.'},
    {img:'jwst-pillars.jpg',     cat:'M16',       region:'Pillars of Creation', eyebrow:'Eagle Nebula',
     k1:'R.A.', v1:'18ʰ 18ᵐ 48ˢ', k2:'DEC', v2:'−13° 49′ 00″', inst:'NIRCam',
     tag:'The Pillars of Creation, raised from gas and dust.'},
    {img:'jwst-southernring.jpg',cat:'NGC 3132',  region:'Southern Ring',       eyebrow:'Planetary Nebula',
     k1:'R.A.', v1:'10ʰ 07ᵐ 02ˢ', k2:'DEC', v2:'−40° 26′ 00″', inst:'NIRCam',
     tag:'A dying star, exhaling its final shells of light.'},
    {img:'jwst-stephan.jpg',     cat:'HCG 92',    region:"Stephan's Quintet",   eyebrow:'Compact Galaxy Group',
     k1:'R.A.', v1:'22ʰ 35ᵐ 58ˢ', k2:'DEC', v2:'+33° 58′ 00″', inst:'NIRCam · MIRI',
     tag:'Five galaxies, locked in a slow cosmic dance.'},
    {img:'jwst-tarantula.jpg',   cat:'NGC 2070',  region:'Tarantula Nebula',    eyebrow:'Star-forming Region',
     k1:'R.A.', v1:'05ʰ 38ᵐ 42ˢ', k2:'DEC', v2:'−69° 06′ 00″', inst:'NIRCam',
     tag:'The Tarantula, a nursery of giant young stars.'},
    {img:'jwst-deepfield.jpg',   cat:'JWST',      region:'Primary Mirror',      eyebrow:'The Instrument',
     k1:'APERTURE', v1:'6.5 m', k2:'SEGMENTS', v2:'18 · Be / Au', inst:'Beryllium · Gold',
     tag:'Eighteen hexagons of gold, tuned to catch first light.'},
  ];

  const slidesEl = $('fs-slides'), indexEl = $('fs-index');
  const slides = PLATES.map((p,i)=>{
    const d = document.createElement('div');
    d.style.cssText = 'position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 2.2s ease;will-change:opacity,transform';
    slidesEl.appendChild(d);
    const t = document.createElement('i');
    t.style.cssText = 'display:block;width:18px;height:1px;background:#9aabc8;opacity:.3;transition:opacity .6s ease,background .6s ease';
    indexEl.appendChild(t);
    return d;
  });

  const els = {
    eyebrow:$('fs-eyebrow'), tagline:$('fs-tagline'), inst:$('fs-inst'),
    name:$('fs-name'), region:$('fs-region'),
    k1:$('fs-k1'), v1:$('fs-v1'), k2:$('fs-k2'), v2:$('fs-v2'),
    credit:$('fs-credit'), rbl:$('fs-rbl')
  };
  const paint = i => {
    const p = PLATES[i];
    els.eyebrow.innerHTML = 'Webb Field Report &nbsp;·&nbsp; ' + p.eyebrow;
    els.tagline.textContent = p.tag;
    els.inst.textContent = p.inst;
    els.name.textContent = p.cat;
    els.region.textContent = '· ' + p.region;
    els.k1.textContent = p.k1; els.v1.textContent = p.v1;
    els.k2.textContent = p.k2; els.v2.textContent = p.v2;
    [...indexEl.children].forEach((t,k)=>{
      t.style.opacity = k===i ? '1' : '.3';
      t.style.background = k===i ? '#c7a24a' : '#9aabc8';
    });
  };
  const activate = (n, prev) => {
    const s = slides[n];
    s.style.opacity = '1';
    if (drift){ s.style.animation = 'none'; void s.offsetWidth; s.style.animation = 'fsKen 42s ease-out both'; }
    if (prev != null && prev !== n) slides[prev].style.opacity = '0';
  };

  slides[0].style.backgroundImage = `url("${PLATES[0].img}")`;
  paint(0); activate(0, null);
  setTimeout(()=>{ PLATES.forEach((p,i)=>{ if(i) slides[i].style.backgroundImage = `url("${p.img}")`; }); }, 1300);

  let cur = 0;
  if (INTERVAL > 0){
    const swapGroup = [els.eyebrow, els.tagline, els.credit, els.rbl];
    setInterval(()=>{
      const n = (cur + 1) % PLATES.length;
      if (!reduce) swapGroup.forEach(e=>{ if(e) e.style.opacity='0'; });
      setTimeout(()=>{ paint(n); if(!reduce) swapGroup.forEach(e=>{ if(e) e.style.opacity='1'; }); }, reduce?0:560);
      activate(n, cur);
      cur = n;
    }, INTERVAL);
  }

  const utc=$('fs-utc'), kst=$('fs-kst');
  const tick = ()=>{
    const d = new Date();
    if(utc) utc.textContent = d.toISOString().slice(11,19);
    if(kst) kst.textContent = d.toLocaleTimeString('ko-KR',{hour12:false,timeZone:'Asia/Seoul'});
  };
  tick(); setInterval(tick, 1000);
})();
</script>
</body>
</html>
